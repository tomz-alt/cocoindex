ci:
  autofix_prs: false
  autoupdate_schedule: 'monthly'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
        # Check for files with names that would conflict on a case-insensitive
        # filesystem like MacOS HFS+ or Windows FAT.
      - id: check-merge-conflict
        # Check for files that contain merge conflict strings.
      - id: check-symlinks
        # Checks for symlinks which do not point to anything.
        exclude: ".*(.github.*)$"
      - id: detect-private-key
        # Checks for the existence of private keys.
      - id: end-of-file-fixer
        # Makes sure files end in a newline and only a newline.
        exclude: ".*(data.*|licenses.*|_static.*|\\.ya?ml|\\.jpe?g|\\.png|\\.svg|\\.webp)$"
      - id: trailing-whitespace
        # Trims trailing whitespace.
        exclude_types: [python]  # Covered by Ruff W291.
        exclude: ".*(data.*|licenses.*|_static.*|\\.ya?ml|\\.jpe?g|\\.png|\\.svg|\\.webp)$"

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-format
        types: [python]
        pass_filenames: true

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.1
    hooks:
      - id: uv-lock
        # Ensures uv.lock is up to date with pyproject.toml

  - repo: local
    hooks:
        - id: mypy-check
          name: mypy type check
          entry: uv run mypy
          language: system
          files: ^(python/|examples/|pyproject\.toml)
          pass_filenames: false

        - id: maturin-develop
          name: maturin develop
          entry: uv run maturin develop
          language: system
          files: ^(rust/|python/|Cargo\.toml|pyproject\.toml)
          pass_filenames: false

        - id: cargo-test
          name: cargo test
          entry: ./dev/run_cargo_test.sh
          language: system
          files: ^(rust/|Cargo\.toml)
          pass_filenames: false

        - id: pytest
          name: pytest
          entry: uv run pytest python/
          language: system
          types: [python]
          pass_filenames: false
          always_run: false

        - id: generate-cli-docs
          name: generate CLI documentation
          entry: uv run python dev/generate_cli_docs.py
          language: system
          files: ^(python/cocoindex/cli\.py|dev/generate_cli_docs\.py)$
          pass_filenames: false
